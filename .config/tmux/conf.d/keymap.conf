# #--- PREFIX ---# #

unbind C-b
set -g prefix `
bind ` send-prefix
set -g prefix2 "\\"
bind "\\" send-prefix -2
unbind q
bind q detach-client
bind r source-file ~/.config/tmux/tmux.conf

# #--- WINDOWS ---# #

# Create new window
unbind n
bind n new-window -c "#{pane_current_path}" # Create new window

# Navigation
unbind [
unbind ]
bind [ previous-window # Select previous window
bind ] next-window # Select next window

# Moving
bind < swap-window -d -t -1
bind > swap-window -d -t +1

# Actions
unbind d
bind d kill-window # Kill window

# #--- PANES ---# #

# Create new pane
bind h split-window -hb -c "#{pane_current_path}"
bind j split-window -v -c "#{pane_current_path}"
bind k split-window -vb -c "#{pane_current_path}"
bind l split-window -h -c "#{pane_current_path}"
bind C-h split-window -f -hb -c "#{pane_current_path}"
bind C-j split-window -f -v -c "#{pane_current_path}"
bind C-k split-window -f -vb -c "#{pane_current_path}"
bind C-l split-window -f -h -c "#{pane_current_path}"

# Navigation
# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l #'

# Resizing
# Smart pane resizing with awareness of Vim splits.
# See: https://github.com/RyanMillerC/better-vim-tmux-resizer
# Edit values if you use custom resize_count variables
bind-key -n C-M-h if-shell "$is_vim" "send-keys C-M-h"  "resize-pane -L 2"
bind-key -n C-M-j if-shell "$is_vim" "send-keys C-M-j"  "resize-pane -D 1"
bind-key -n C-M-k if-shell "$is_vim" "send-keys C-M-k"  "resize-pane -U 1"
bind-key -n C-M-l if-shell "$is_vim" "send-keys C-M-l"  "resize-pane -R 2"
bind-key -T copy-mode-vi C-M-h resize-pane -L 2
bind-key -T copy-mode-vi C-M-j resize-pane -D 1
bind-key -T copy-mode-vi C-M-k resize-pane -U 1
bind-key -T copy-mode-vi C-M-l resize-pane -R 2

# Moving
bind K swap-pane -d -t -1
bind J swap-pane -d -t +1

# Actions
unbind !
bind ! join-pane -t 1
unbind @
bind @ join-pane -t 2
unbind '#'
bind '#' join-pane -t 3
unbind '$'
bind '$' join-pane -t 4
unbind %
bind % join-pane -t 5
unbind ^
bind ^ join-pane -t 6
unbind &
bind & join-pane -t 7
unbind *
bind * join-pane -t 8
unbind (
bind ( join-pane -t 9
unbind )
bind ) join-pane -t 10
unbind b
bind b break-pane
unbind c
bind c kill-pane # Kill pane
bind Enter resize-pane -Z

# #--- COPY MODE ---# #

setw -g mode-keys vi # Use vi keys
bind Escape copy-mode # Enable copy mode
bind-key -Tcopy-mode-vi 'i' send -X cancel # Cancel copy mode
bind-key -Tcopy-mode-vi 'v' send -X begin-selection # Visual select
# bind-key -Tcopy-mode-vi 'y' send -X copy-pipe "/tmp/tmux_copy" # Copy selection
bind-key -Tcopy-mode-vi 'y' send -X copy-pipe "xclip -selection clipboard" # Copy selection
unbind p
bind p paste-buffer # Paste buffer
