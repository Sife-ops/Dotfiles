#^ set-option

set-option -g default-terminal "tmux-256color"
set-option -g pane-active-border-style fg=brightyellow
set-option -g pane-border-style fg=blue
set-option -g prefix `
set-option -g prefix2 "\\"
set-option -g renumber-windows on
set-option -g status-interval 60
set-option -g status-right "#[fg=yellow]#(notify.sh) #[fg=blue]#(mail.sh) #[fg=white]#(feeds.sh) #[fg=green]#(pacman.sh) #[default]#(date '+%d-%b-%y %H:%M') "
set-option -g status-right-length 100
set-option -g status-style fg=brightyellow,bg=black,bright
set-option -sg escape-time 0
set-option -wg mode-keys vi
set-option -wg window-status-current-format '#[fg=black,bg=brightyellow,dim] #W '
set-option -wg window-status-format '#[fg=brightyellow,bg=black,dim] #W '
set-option -wg xterm-keys on

# set-option -g status-right "#S"
# set-option -g status-left "#(date '+%H:%M:%S %d-%b-%y')"
