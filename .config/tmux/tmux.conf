set -g default-terminal "xterm-256color"
set -g pane-active-border-style fg=yellow
set -g pane-border-style fg=black
set -g status-style fg=yellow,bg=black
set -sg escape-time 0
setw -g mode-keys vi
setw -g window-status-current-format '#[fg=black,bg=yellow] #I #W #F '
setw -g window-status-format '#[fg=yellow,bg=black] #I #W #F '

bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind-key -Tcopy-mode-vi 'y' send -X copy-pipe "cat > $CLIPBOARD"
bind-key -n 'C-M-h' resize-pane -L 2
bind-key -n 'C-M-j' resize-pane -D 1
bind-key -n 'C-M-k' resize-pane -U 1
bind-key -n 'C-M-l' resize-pane -R 2
bind-key -n 'C-h' select-pane -L
bind-key -n 'C-j' select-pane -D
bind-key -n 'C-k' select-pane -U
bind-key -n 'C-l' select-pane -R
bind-key p previous-window
